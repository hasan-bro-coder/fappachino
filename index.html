<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fappachino</title>
</head>

<body>
  <div id="app">
    <!-- <div class="noise"></div> -->

    <header>
      <div class="logo">FAPPACHINO</div>
      <nav>
        <button class="nav-btn active" data-tab="timer">TIMER</button>
        <button class="nav-btn" data-tab="achievements">RANKS</button>
        <button class="nav-btn" data-tab="history">HISTORY</button>
      </nav>
    </header>

    <!-- TIMER TAB -->
    <section class="tab active" id="tab-timer">
      <div class="timer-hero">
        <div class="status-pill" id="status-pill">● STOPPED</div>

        <div class="big-display">
          <div class="time-unit">
            <span class="time-val" id="days">000</span>
            <span class="time-label">DAYS</span>
          </div>
          <div class="sep">:</div>
          <div class="time-unit">
            <span class="time-val" id="hours">00</span>
            <span class="time-label">HRS</span>
          </div>
          <div class="sep">:</div>
          <div class="time-unit">
            <span class="time-val" id="minutes">00</span>
            <span class="time-label">MIN</span>
          </div>
          <div class="sep">:</div>
          <div class="time-unit">
            <span class="time-val" id="seconds">00</span>
            <span class="time-label">SEC</span>
          </div>
        </div>

        <div class="rank-badge">
          <span id="rank-icon">🌱</span>
          <span id="rank-name">—</span>
        </div>

        <div class="progress-bar-wrap">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <div class="progress-labels">
            <span id="progress-label">Start to begin tracking</span>
            <span id="progress-pct">0%</span>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-accent" id="btn-start">START</button>
        <button class="btn btn-ghost" id="btn-reset">RESET</button>
      </div>

      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-val" id="stat-streak">0</span>
          <span class="stat-key">BEST STREAK (DAYS)</span>
        </div>
        <div class="stat-card">
          <span class="stat-val" id="stat-sessions">0</span>
          <span class="stat-key">TOTAL SESSIONS</span>
        </div>
      </div>
    </section>

    <!-- ACHIEVEMENTS TAB -->
    <section class="tab" id="tab-achievements">
      <div class="tab-header">
        <h2>RANKS & ACHIEVEMENTS</h2>
        <p class="sub">Keep going dawg</p>
      </div>
      <div class="achievements-grid" id="achievements-grid"></div>
    </section>

    <!-- HISTORY TAB -->
    <section class="tab" id="tab-history">
      <div class="tab-header">
        <h2>HISTORY</h2>
        <p class="sub">DO NOT REDEEM THE CARD</p>
      </div>
      <div class="history-list" id="history-list">
        <div class="empty-state">No history yet.<br />Start your first streak.</div>
      </div>
      <button class="btn btn-ghost btn-full" id="btn-clear-history">CLEAR HISTORY</button>
    </section>


    <div id="pwa-toast">
      <button id="pwa-close">close</button>
      <button id="pwa-refresh">refresh</button>
      <div class="message">
        <div id="toast-message"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
